services:
  postgres:
    image: postgres:17-alpine
    container_name: pharma-sales-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: pharma_sales_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    name: pharma-sales-postgres-data
